name = "smart-note-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace binding (free tier)
[[kv_namespaces]]
binding = "SMART_NOTE_KV"
id = "9239f2ad3b764bd79111c436678ab4fb"

# Cloudflare Workers AI binding (free: 10,000 neurons/day)
[ai]
binding = "AI"

# Environment variables (set secrets via: npx wrangler secret put JWT_SECRET)
[vars]
ENVIRONMENT = "production"

# Cron Trigger: Auto-blog generation daily at 9 AM Vietnam time (2 AM UTC)
[triggers]
crons = ["0 2 * * *"]
