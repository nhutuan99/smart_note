name = "smart-note-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# KV namespace binding (free tier)
[[kv_namespaces]]
binding = "SMART_NOTE_KV"
id = "9239f2ad3b764bd79111c436678ab4fb"

# Cloudflare Workers AI binding (free: 10,000 neurons/day)
[ai]
binding = "AI"

# Environment variables (set secrets via: npx wrangler secret put JWT_SECRET)
[vars]
ENVIRONMENT = "production"
FRONTEND_URL = "https://finnote-f4n.pages.dev"
API_URL = "https://smart-note-api.smart-note.workers.dev"

# Cron Triggers:
# 1. Stock alert checks every 30 min during trading hours 9-15h VN (2-8 UTC), Mon-Fri
# 2. Reminder checks every 15 minutes (24/7)
[triggers]
crons = ["*/30 2-8 * * 1-5", "*/15 * * * *"]
