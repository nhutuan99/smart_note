  <body>
    <!-- PWA Splash Screen (outside #app so Vue doesn't destroy it on mount) -->
    <!-- Theme detection: apply before splash renders to avoid flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('sn_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <div id="pwa-splash">
      <!-- Animated background glow -->
      <div class="splash-glow"></div>
      <!-- Logo -->
      <div class="splash-logo">
        <img src="/images/logo-512.png" alt="FinNote" width="80" height="80" fetchpriority="high" />
        <div class="splash-shimmer"></div>
      </div>
      <!-- Brand -->
      <div class="splash-title">FinNote</div>
      <div class="splash-subtitle">Smart Finance Manager</div>
      <!-- Progress bar -->
      <div class="splash-progress">
        <div class="splash-progress-bar"></div>
      </div>
    </div>

    <style>
      /* ── Splash Dark (default) ── */
      #pwa-splash {
        --splash-bg: #0a0a0f;
        --splash-title-color: #fff;
        --splash-subtitle-color: #888;
        --splash-progress-bg: #1a1a24;
        --splash-glow-opacity: 0.3;
      }
      /* ── Splash Light ── */
      [data-theme='light'] #pwa-splash {
        --splash-bg: #f8fafc;
        --splash-title-color: #0f172a;
        --splash-subtitle-color: #64748b;
        --splash-progress-bg: #e2e8f0;
        --splash-glow-opacity: 0.15;
      }

      body {
        background-color: var(--splash-bg);
      }

      #pwa-splash {
        position: fixed; inset: 0; z-index: 99999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: var(--splash-bg);
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        padding-top: env(safe-area-inset-top, 0px);
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #pwa-splash.splash-hide {
        opacity: 0;
        pointer-events: none;
      }
      .splash-glow {
        position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%);
        width: 320px; height: 320px;
        background: radial-gradient(circle, rgba(124,111,247,var(--splash-glow-opacity)) 0%, rgba(124,111,247,0.05) 40%, transparent 70%);
        border-radius: 50%;
        animation: splash-glow-pulse 4s ease-in-out infinite;
      }
      .splash-logo {
        position: relative;
        width: 80px; height: 80px; margin-bottom: 24px;
        animation: splash-float 3s ease-in-out infinite;
      }
      .splash-logo img {
        width: 100%; height: 100%; border-radius: 20px; object-fit: cover;
        box-shadow: 0 10px 40px rgba(124,111,247,0.4), 0 0 0 1px rgba(124,111,247,0.2);
      }
      .splash-shimmer {
        position: absolute; inset: -2px; border-radius: 22px; overflow: hidden;
      }
      .splash-shimmer::after {
        content: '';
        position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
        background: conic-gradient(from 0deg, transparent, rgba(124,111,247,0.4), transparent 30%);
        animation: splash-shimmer-spin 3s linear infinite;
      }
      .splash-title {
        font-size: 28px; font-weight: 800; color: var(--splash-title-color);
        letter-spacing: -0.5px; margin-bottom: 6px;
        position: relative; z-index: 1;
      }
      .splash-subtitle {
        font-size: 14px; font-weight: 500; color: var(--splash-subtitle-color); letter-spacing: 0.5px;
        margin-bottom: 40px; position: relative; z-index: 1;
      }
      .splash-progress {
        width: 140px; height: 4px; background: var(--splash-progress-bg);
        border-radius: 4px; overflow: hidden; position: relative; z-index: 1;
      }
      .splash-progress-bar {
        height: 100%; width: 0; border-radius: 4px;
        background: linear-gradient(90deg, #7c6ff7, #a78bfa);
        animation: splash-load 2s ease-out forwards;
      }

      @keyframes splash-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes splash-glow-pulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.6; }
        50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      }
      @keyframes splash-shimmer-spin {
        to { transform: rotate(360deg); }
      }
      @keyframes splash-load {
        0% { width: 0; }
        20% { width: 30%; }
        50% { width: 60%; }
        80% { width: 85%; }
        100% { width: 100%; }
      }
    </style>

    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
            .then(reg => {
              // Force check for SW update on every page load
              reg.update().catch(() => {})
            })
            .catch(() => {})
        })
      }
      // Fade out splash after app is ready
      window.__removeSplash = function() {
        var s = document.getElementById('pwa-splash');
        if (s) {
          s.classList.add('splash-hide');
          setTimeout(function() { s.remove(); }, 600);
        }
      }
    </script>
