  <body>
    <div id="app">
      <!-- PWA Splash Loading Screen (shown before Vue mounts, auto-replaced) -->
      <div id="pwa-splash" style="
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #000000;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        padding-top: env(safe-area-inset-top, 0px);
      ">
        <div style="
          width: 72px; height: 72px; margin-bottom: 20px;
          animation: splash-pulse 2s ease-in-out infinite;
        ">
          <img src="/images/logo-512.png" alt="FinNote" style="width:100%;height:100%;border-radius:16px;object-fit:cover;" />
        </div>
        <div style="font-size:22px;font-weight:700;color:#ffffff;letter-spacing:-0.5px;margin-bottom:8px;">FinNote</div>
        <div style="font-size:12px;color:#525252;margin-bottom:32px;">Smart Finance Manager</div>
        <div style="
          width: 24px; height: 24px;
          border: 2px solid #262626;
          border-top-color: #7c6ff7;
          border-radius: 50%;
          animation: splash-spin 0.8s linear infinite;
        "></div>
      </div>
      <style>
        @keyframes splash-pulse {
          0%, 100% { transform: scale(1); opacity: 1; }
          50% { transform: scale(1.05); opacity: 0.85; }
        }
        @keyframes splash-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {})
        })
      }
    </script>
  </body>
