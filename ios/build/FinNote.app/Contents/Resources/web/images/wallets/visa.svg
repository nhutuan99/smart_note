<svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
  <!-- Card Background -->
  <rect width="120" height="80" rx="10" fill="url(#bgGradient)" />
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1F71" />
      <stop offset="100%" stop-color="#1434CB" />
    </linearGradient>
    <linearGradient id="chipV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F9D976" />
      <stop offset="100%" stop-color="#E1B73F" />
    </linearGradient>
  </defs>

  <!-- EMV Chip with details -->
  <g transform="translate(14, 28)">
    <rect width="18" height="14" rx="3" fill="url(#chipV)" />
    <!-- Chip Lines -->
    <path d="M 6 0 L 6 14 M 12 0 L 12 14 M 0 4 L 6 4 M 0 10 L 6 10 M 12 4 L 18 4 M 12 10 L 18 10" stroke="#B89737" stroke-width="0.5" fill="none" />
    <circle cx="9" cy="7" r="2.5" stroke="#B89737" stroke-width="0.5" fill="none" />
  </g>

  <!-- Contactless Icon -->
  <g transform="translate(90, 32)">
    <path d="M 0 0 Q 3 3 0 6 M 3 -2 Q 7 3 3 8 M 6 -4 Q 11 3 6 10 M 9 -6 Q 15 3 9 12" stroke="#ffffff" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- VISA Text (Precise SVG Path for VISA logo to make it look authentic) -->
  <!-- Simplified text for approximation, but using an italic heavy font -->
  <text x="68" y="65" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="24" font-style="italic" letter-spacing="-1">VISA</text>
  <path d="M66,48 L76,48 L73,65 L63,65 Z M81,48" fill="#ffffff" opacity="0" /> <!-- To align strictly if needed -->
</svg>
