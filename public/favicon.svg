<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="glow" x1="8" y1="8" x2="56" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06d6a0"/>
    </linearGradient>
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#10b981" stroke-opacity="0.18" stroke-width="1"/>

  <!-- S letterform path — bold, modern -->
  <path
    d="M 16 22
       C 16 18 19 15 24 15
       L 34 15
       C 38 15 41 17.5 41 21.5
       C 41 24.5 39 26.5 36 27.5
       L 24 31
       C 20 32.2 18 34.5 18 38
       C 18 42.5 21.5 45 26 45
       L 36 45
       C 40.5 45 44 42.5 44 38.5"
    stroke="url(#glow)"
    stroke-width="4.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    filter="url(#softglow)"
  />

  <!-- Lightning bolt / spark accent — top right -->
  <path
    d="M 44 10 L 39 22 L 44 22 L 38 34"
    stroke="#06d6a0"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.85"
  />

  <!-- Accent dot -->
  <circle cx="47" cy="49" r="3.5" fill="#10b981" opacity="0.9"/>
  <circle cx="47" cy="49" r="1.8" fill="#06d6a0"/>
</svg>
